name = "gs-gateway"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

workers_dev = false

[env.prod]
routes = [
  { pattern = "gw.goldshore.ai/*", zone_name = "goldshore.ai" },
  { pattern = "agent.goldshore.ai/*", zone_name = "goldshore.ai" }
]

[env.prod.vars]
ENV = "production"

[[env.prod.services]]
binding = "API"
service = "gs-api"
environment = "production"

[env.preview]
routes = [
  { pattern = "gw-preview.goldshore.ai/*", zone_name = "goldshore.ai" }
]

[env.preview.vars]
ENV = "preview"
