name = "gs-mail"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

workers_dev = false

[env.prod]
routes = [
  { pattern = "mail.goldshore.ai/*", zone_name = "goldshore.ai" }
]

[env.prod.vars]
ENV = "production"
MAIL_SERVICE = "true"
MAIL_ALLOWED_RECIPIENTS = "ops@goldshore.ai,inbox@goldshore.ai"

[env.preview]
routes = [
  { pattern = "mail-preview.goldshore.ai/*", zone_name = "goldshore.ai" }
]

[env.preview.vars]
ENV = "preview"
