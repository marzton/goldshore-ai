name = "gs-mail"
main = "src/index.ts"
compatibility_date = "2026-03-03" # Updated to current standards
compatibility_flags = ["nodejs_compat"]

# This binding is CRITICAL for the EMAIL_INBOX_LOGS persistence logic
[[kv_namespaces]]
binding = "GS_CONFIG"
id = "9cc2209906a94851b704be57543987a9"

[vars]
ENV = "production"
# Standardized forwarding address per SOP
MAIL_FORWARD_TO = "ops@goldshore.ai"

[env.dev]
name = "gs-mail-dev"
[[env.dev.kv_namespaces]]
binding = "GS_CONFIG"
id = "9cc2209906a94851b704be57543987a9"
[env.dev.vars]
ENV = "development"

[env.prod]
name = "gs-mail"

[[env.prod.kv_namespaces]]
binding = "GS_CONFIG"
id = "9cc2209906a94851b704be57543987a9"

[env.prod.vars]
ENV = "production"
MAIL_FORWARD_TO = "ops@goldshore.ai"

