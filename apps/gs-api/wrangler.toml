name = "gs-api"
main = "src/index.ts"
compatibility_date = "2025-10-08"
compatibility_flags = ["nodejs_compat"]

# Default / Development Bindings
[[kv_namespaces]]
binding = "KV"
id = "9cc2209906a94851b704be57543987a9"

# Keep split namespaces available for migration work while handlers continue using KV.
[[kv_namespaces]]
binding = "GS_CONFIG"
id = "5f13370575784c9dacff522121104cb3"

[[kv_namespaces]]
binding = "GS_API_DATA"
id = "9cc2209906a94851b704be57543987a9"

[[d1_databases]]
binding = "DB"
database_name = "gs-api-db"
database_id = "gs-api-db"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "gs-api-assets"

[ai]
binding = "AI"

# Production Environment Overrides
[env.production]
[[env.production.kv_namespaces]]
binding = "KV"
id = "9cc2209906a94851b704be57543987a9"

[[env.production.kv_namespaces]]
binding = "GS_CONFIG"
id = "5f13370575784c9dacff522121104cb3"

[[env.production.kv_namespaces]]
binding = "GS_API_DATA"
id = "9cc2209906a94851b704be57543987a9"

[[env.production.d1_databases]]
binding = "DB"
database_name = "gs-api-db"
database_id = "gs-api-db"

[[env.production.r2_buckets]]
binding = "ASSETS"
bucket_name = "gs-api-assets"

[env.production.ai]
binding = "AI"

# Backward-compatible alias for existing build scripts (`--env prod`)
[env.prod]
[[env.prod.kv_namespaces]]
binding = "KV"
id = "9cc2209906a94851b704be57543987a9"

[[env.prod.kv_namespaces]]
binding = "GS_CONFIG"
id = "5f13370575784c9dacff522121104cb3"

[[env.prod.kv_namespaces]]
binding = "GS_API_DATA"
id = "9cc2209906a94851b704be57543987a9"

[[env.prod.d1_databases]]
binding = "DB"
database_name = "gs-api-db"
database_id = "gs-api-db"

[[env.prod.r2_buckets]]
binding = "ASSETS"
bucket_name = "gs-api-assets"

[env.prod.ai]
binding = "AI"
