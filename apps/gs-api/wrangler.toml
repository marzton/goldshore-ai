name = "gs-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

workers_dev = false

[env.prod]
routes = [
  { pattern = "api.goldshore.ai/*", zone_name = "goldshore.ai" }
]

[env.prod.vars]
ENV = "production"

# Sentinel: Audience tag for Cloudflare Access.
# CRITICAL: This must be set to the specific Application Audience (AUD) tag
# for the GoldShore API service to prevent token reuse from other apps.
CLOUDFLARE_ACCESS_AUDIENCE = "YOUR_AUDIENCE_TAG_HERE"

# Sentinel: Team domain for Cloudflare Access (e.g., goldshore.cloudflareaccess.com).
# Used to fetch JWKS for token verification.
CLOUDFLARE_TEAM_DOMAIN = "goldshore.cloudflareaccess.com"
CONTROL_SYNC_TOKEN = "set-a-shared-secret"

[[env.prod.kv_namespaces]]
binding = "KV"
id = "gs_api_kv_001"


[[env.prod.kv_namespaces]]
binding = "CONTROL_LOGS"
id = "gs_control_logs_001"

[[env.prod.r2_buckets]]
binding = "ASSETS"
bucket_name = "gs-assets"

[[env.prod.d1_databases]]
binding = "DB"
database_name = "goldshore"
database_id = "gs_db_001"

[env.prod.ai]
binding = "AI"

[env.production]
routes = [
  { pattern = "api.goldshore.ai/*", zone_name = "goldshore.ai" }
]

[env.production.vars]
ENV = "production"

# Sentinel: Audience tag for Cloudflare Access.
# CRITICAL: This must be set to the specific Application Audience (AUD) tag
# for the GoldShore API service to prevent token reuse from other apps.
CLOUDFLARE_ACCESS_AUDIENCE = "YOUR_AUDIENCE_TAG_HERE"

# Sentinel: Team domain for Cloudflare Access (e.g., goldshore.cloudflareaccess.com).
# Used to fetch JWKS for token verification.
CLOUDFLARE_TEAM_DOMAIN = "goldshore.cloudflareaccess.com"
CONTROL_SYNC_TOKEN = "set-a-shared-secret"

[[env.production.kv_namespaces]]
binding = "KV"
id = "gs_api_kv_001"

[[env.production.kv_namespaces]]
binding = "CONTROL_LOGS"
id = "gs_control_logs_001"

[[env.production.r2_buckets]]
binding = "ASSETS"
bucket_name = "gs-assets"

[[env.production.d1_databases]]
binding = "DB"
database_name = "goldshore"
database_id = "gs_db_001"

[env.production.ai]
binding = "AI"

[env.preview]
routes = [
  { pattern = "api-preview.goldshore.ai/*", zone_name = "goldshore.ai" }
]

[env.preview.vars]
ENV = "preview"
CLOUDFLARE_ACCESS_AUDIENCE = "SECRET_MANAGED"
CLOUDFLARE_TEAM_DOMAIN = "goldshore.cloudflareaccess.com"
CONTROL_SYNC_TOKEN = "SECRET_MANAGED"

[[env.preview.kv_namespaces]]
binding = "KV"
id = "gs_api_kv_preview"

[[env.preview.kv_namespaces]]
binding = "CONTROL_LOGS"
id = "gs_control_logs_preview"

[[env.preview.r2_buckets]]
binding = "ASSETS"
bucket_name = "gs-assets-preview"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "goldshore_preview"
database_id = "gs_db_preview"

[env.preview.ai]
binding = "AI"
