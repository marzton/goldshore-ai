name = "gs-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[[kv_namespaces]]
binding = "GS_KV"
id = "gs_api_kv_prod_001"

[[r2_buckets]]
binding = "GS_ASSETS"
bucket_name = "gs-api-assets"

[[d1_databases]]
binding = "GS_DB"
database_name = "gs_database"
database_id = "gs_database_id_001"

[ai]
binding = "AI"

[observability]
enabled = true


[env.preview]
name = "gs-api-preview"

[[env.preview.kv_namespaces]]
binding = "GS_KV"
id = "gs_api_kv_preview_001"

[[env.preview.r2_buckets]]
binding = "GS_ASSETS"
bucket_name = "gs-api-assets-preview"

[[env.preview.d1_databases]]
binding = "GS_DB"
database_name = "gs_database_preview"
database_id = "gs_database_preview_id_001"

[env.preview.ai]
binding = "AI"

[env.preview.observability]
enabled = true
