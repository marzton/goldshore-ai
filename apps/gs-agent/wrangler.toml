# wrangler.toml for the background Agent Worker

name = "gs-agent" # Base name, will be suffixed per environment
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
tsconfig = "tsconfig.json"

[vars]
ENV = "production"
# Sentinel: Bindings for Auth verification
# CLOUDFLARE_ACCESS_AUDIENCE will be injected via secrets

[ai]
binding = "AI"

[env.dev]
name = "gs-agent-dev"

[env.preview]
name = "gs-agent-preview"

[env.prod]
name = "gs-agent"
[env.prod.ai]
  binding = "AI"
[env.prod.vars]
  ENV = "production"
[[env.prod.queues.consumers]]
  queue = "goldshore-jobs"

[[queues.consumers]]
  queue = "goldshore-jobs"
