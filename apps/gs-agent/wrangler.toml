name = "gs-agent"
main = "src/index.ts"
compatibility_date = "2025-01-10"
compatibility_flags = ["nodejs_compat"]
tsconfig = "tsconfig.json"

[vars]
ENV = "production"

[ai]
binding = "AI"

# This Worker is a Consumer, not a Producer. 
# It listens for jobs sent by gs-gateway and gs-api.
[[queues.consumers]]
queue = "goldshore-jobs"
max_batch_size = 10
max_batch_timeout = 5

[[kv_namespaces]]
binding = "AGENT_KV"
id = "9cc2209906a94851b704be57543987a9" # Shared GS_API_DATA for config

[[d1_databases]]
binding = "DB"
database_name = "goldshore"
database_id = "33b71eca-4987-4a0c-8721-c1c777b8b6a3"

# --- Environment Configurations ---

[env.dev]
name = "gs-agent-dev"
[env.dev.vars]
  ENV = "development"

[env.prod]
name = "gs-agent"
[env.prod.vars]
  ENV = "production"
[[env.prod.queues.consumers]]
  queue = "goldshore-jobs"
  max_batch_size = 10

[[env.prod.kv_namespaces]]
  binding = "AGENT_KV"
  id = "9cc2209906a94851b704be57543987a9"

[[env.prod.d1_databases]]
  binding = "DB"
  database_name = "goldshore"
  database_id = "33b71eca-4987-4a0c-8721-c1c777b8b6a3"

[env.prod.ai]
binding = "AI"

[env.preview]
name = "gs-agent-preview"
[env.preview.vars]
  ENV = "preview"

[[env.preview.queues.consumers]]
  queue = "goldshore-jobs"
  max_batch_size = 10
  max_batch_timeout = 5

[[env.preview.kv_namespaces]]
  binding = "AGENT_KV"
  id = "9cc2209906a94851b704be57543987a9"

[[env.preview.d1_databases]]
  binding = "DB"
  database_name = "goldshore"
  database_id = "33b71eca-4987-4a0c-8721-c1c777b8b6a3"

[env.preview.ai]
binding = "AI"
