# wrangler.toml for the background Agent Worker

name = "gs-agent" # Base name, will be suffixed per environment
main = "src/index.ts"
compatibility_date = "2024-03-20"
tsconfig = "tsconfig.json"

[env.dev]
name = "gs-agent-dev"

[env.preview]
name = "gs-agent-preview"

[env.prod]
name = "gs-agent"

[[queues.consumers]]
  queue = "goldshore-jobs"
