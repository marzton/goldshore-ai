<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 128" role="img" aria-labelledby="title desc">
  <title id="title">Gold Shore logo</title>
  <desc id="desc">A geometric Gold Shore mark paired with a bold GOLD SHORE wordmark.</desc>
  <style>
    .mark-fill {
      fill: #f4efe4;
    }

    .mark-stroke {
      stroke: #f4efe4;
      stroke-width: 2.4;
      stroke-linejoin: round;
    }

    .wordmark {
      fill: #f4efe4;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .wordmark-accent {
      opacity: 0.92;
    }
  </style>

  <g class="mark-fill">
    <path d="M64 12 22 86h18.5L72 30.5H64Z" />
    <path d="M64 12h8l33.8 58.4-9.3 16.2L64 30.5Z" opacity="0.94" />
    <path d="M22 86h74.5L87.2 102H31.2z" opacity="0.88" />
  </g>
  <path class="mark-stroke" d="M64 12 22 86h18.5L72 30.5H64Zm8 0h-8l33.8 58.4-9.3 16.2L64 30.5Zm-50 74 9.2 16h56l9.3-16H22Z" />

  <text class="wordmark" x="146" y="76">
    <tspan class="wordmark-accent">GOLD</tspan>
    <tspan x="288" y="76">SHORE</tspan>
  </text>
</svg>
