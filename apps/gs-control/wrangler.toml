name = "gs-control"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

workers_dev = false
routes = [
  { pattern = "ops.goldshore.ai/*", zone_name = "goldshore.ai" }
]

[vars]
ENV = "production"
ALLOWED_ORIGINS = "https://admin.goldshore.ai,https://admin-preview.goldshore.ai,http://localhost:4321"

[[kv_namespaces]]
binding = "CONTROL_LOGS"
id = "gs_control_logs_001"

[[r2_buckets]]
binding = "STATE"
bucket_name = "gs-control-state"

[[services]]
binding = "API"
service = "gs-api"

[[services]]
binding = "GATEWAY"
service = "gs-gateway"
