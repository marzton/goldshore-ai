name = "gs-control"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
tsconfig = "tsconfig.json"

workers_dev = false
routes = [
  { pattern = "ops.goldshore.ai/*", zone_name = "goldshore.ai" }
]

[vars]
ENV = "production"
# CONTROL_SYNC_TOKEN is managed via Cloudflare Secret.
CONTROL_SYNC_TOKEN = "SECRET_MANAGED"
SYNC_TARGET_SUBDOMAIN = "api.goldshore.ai"

[[kv_namespaces]]
binding = "CONTROL_LOGS"
id = "gs_control_logs_001"

[[kv_namespaces]]
binding = "GS_CONFIG"
id = "9cc2209906a94851b704be57543987a9"

[[r2_buckets]]
binding = "STATE"
bucket_name = "gs-control-state"

[[services]]
binding = "API"
service = "gs-api"
environment = "production"

[[services]]
binding = "GATEWAY"
service = "gs-gateway"
environment = "production"

[env.preview]
routes = [
  { pattern = "ops-preview.goldshore.ai/*", zone_name = "goldshore.ai" }
]

[env.preview.vars]
ENV = "preview"
CONTROL_SYNC_TOKEN = "SECRET_MANAGED"
SYNC_TARGET_SUBDOMAIN = "api-preview.goldshore.ai"

[[env.preview.kv_namespaces]]
binding = "CONTROL_LOGS"
id = "gs_control_logs_preview"

[[env.preview.kv_namespaces]]
binding = "GS_CONFIG"
id = "9cc2209906a94851b704be57543987a9"

[[env.preview.r2_buckets]]
binding = "STATE"
bucket_name = "gs-control-state"

[[env.preview.services]]
binding = "API"
service = "gs-api"
environment = "preview"

[[env.preview.services]]
binding = "GATEWAY"
service = "gs-gateway"
environment = "preview"

[env.prod]
routes = [
  { pattern = "ops.goldshore.ai/*", zone_name = "goldshore.ai" }
]

[env.prod.vars]
