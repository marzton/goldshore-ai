# ============================================================
# ⛔ DO NOT DEPLOY FROM THIS FILE
# This is a legacy root-level wrangler config kept only for
# reference and local `wrangler dev` convenience.
#
# The CANONICAL deploy config for gs-gateway is:
#   apps/gs-gateway/wrangler.toml
#
# All CI deploys target apps/gs-gateway/wrangler.toml via
# .github/workflows/deploy-gs-gateway.yml.
#
# Deploying from here will produce a gateway with EMPTY
# Cloudflare Access audience — auth will NOT be enforced.
# ============================================================
name = "gs-gateway"
main = "apps/gs-gateway/src/index.ts"
compatibility_date = "2025-01-10"
compatibility_flags = ["nodejs_compat"]

workers_dev = false
routes = [
  { pattern = "gw.goldshore.ai/*", zone_name = "goldshore.ai" }
]

[vars]
ENV = "production"
API_ORIGIN = "https://api.goldshore.ai"
# Sentinel: These MUST be set to real values before any production deploy.
# An empty string here means Cloudflare Access audience checks are DISABLED.
CLOUDFLARE_ACCESS_AUDIENCE = "NOT_SET__SEE_apps/gs-gateway/wrangler.toml"
CLOUDFLARE_TEAM_DOMAIN = "NOT_SET__SEE_apps/gs-gateway/wrangler.toml"

[[kv_namespaces]]
binding = "GATEWAY_KV"
id = "goldshore-gw-kv"

[[queues.producers]]
binding = "JOB_QUEUE"
queue = "goldshore-jobs"

[[services]]
binding = "API"
service = "gs-api"
environment = "prod"

[ai]
binding = "AI"

[env.preview]
name = "gs-gateway-preview"
workers_dev = true

[env.preview.vars]
ENV = "preview"
API_ORIGIN = "https://api.goldshore.ai"
CLOUDFLARE_ACCESS_AUDIENCE = "NOT_SET__SEE_apps/gs-gateway/wrangler.toml"
CLOUDFLARE_TEAM_DOMAIN = "NOT_SET__SEE_apps/gs-gateway/wrangler.toml"

[[env.preview.kv_namespaces]]
binding = "GATEWAY_KV"
id = "goldshore-gw-kv"

[[env.preview.queues.producers]]
binding = "JOB_QUEUE"
queue = "goldshore-jobs"

[[env.preview.services]]
binding = "API"
service = "gs-api"
environment = "preview"

[env.preview.ai]
binding = "AI"

