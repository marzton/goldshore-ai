name = "gs-gateway"
main = "apps/gs-gateway/src/index.ts"
compatibility_date = "2025-01-10"
compatibility_flags = ["nodejs_compat"]

workers_dev = false
routes = [
  { pattern = "gw.goldshore.ai/*", zone_name = "goldshore.ai" }
]

[vars]
ENV = "production"
API_ORIGIN = "https://api.goldshore.ai"
CLOUDFLARE_ACCESS_AUDIENCE = ""
CLOUDFLARE_TEAM_DOMAIN = ""

[[kv_namespaces]]
binding = "GATEWAY_KV"
id = "goldshore-gw-kv"

[[queues.producers]]
binding = "JOB_QUEUE"
queue = "goldshore-jobs"

[[services]]
binding = "API"
service = "gs-api"
environment = "prod"

[ai]
binding = "AI"

[env.preview]
name = "gs-gateway-preview"
workers_dev = true

[env.preview.vars]
ENV = "preview"
API_ORIGIN = "https://api.goldshore.ai"
CLOUDFLARE_ACCESS_AUDIENCE = ""
CLOUDFLARE_TEAM_DOMAIN = ""

[[env.preview.kv_namespaces]]
binding = "GATEWAY_KV"
id = "goldshore-gw-kv"

[[env.preview.queues.producers]]
binding = "JOB_QUEUE"
queue = "goldshore-jobs"

[[env.preview.services]]
binding = "API"
service = "gs-api"
environment = "preview"

[env.preview.ai]
binding = "AI"
