name: Preview Control Worker (ops.goldshore.ai)

permissions:
  contents: read

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - ready_for_review
    paths:
      - "apps/gs-control/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  preview-control:
    runs-on: ubuntu-latest
    if: false # Explicitly disable job

    steps:
      - uses: actions/checkout@3df4d485d8ce6d2b61b8d12e8f44cdfffbea301e

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate workspace contract
        run: pnpm validate:workspace

      - name: Validate canonical worker structure
        run: pnpm validate:structure

      - name: Validate canonical worker names
        run: pnpm validate:names

      - name: Deploy Control worker (preview)
        working-directory: apps/gs-control
      - name: Deploy Control worker (preview)
        working-directory: apps/control-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
