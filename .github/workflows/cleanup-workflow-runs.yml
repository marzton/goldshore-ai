# Manual operations guide:
# - Use this workflow to bulk-delete old or failed workflow runs after an incident or to recover Actions storage.
# - Prefer dry_run=true first so operators can confirm which runs will be targeted.
name: "Maintenance: Cleanup Workflow Runs"
run-name: "Workflow cleanup • ${{ github.event_name == 'workflow_dispatch' && format('{0} • @{1}', inputs.status_filter, github.actor) || format('PR #{0}', github.event.pull_request.number) }}"

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:
    inputs:
      status_filter:
        description: "Comma-separated run conclusions/statuses to inspect and optionally delete (for example: startup_failure,failure,cancelled)."
        required: false
        default: "startup_failure,failure,cancelled"
      workflow_name:
        description: "Optional exact workflow name to limit cleanup to a single pipeline."
        required: false
        default: ""
      max_runs:
        description: "Maximum number of runs to inspect for each selected status before deletion begins."
        required: false
        default: "500"
      dry_run:
        description: "Set to true to preview matches without deleting any workflow runs."
        required: false
        default: "false"

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cleanup workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          STATUS_FILTER: ${{ github.event_name == 'workflow_dispatch' && inputs.status_filter || 'startup_failure,failure,cancelled' }}
          WORKFLOW_FILTER: ${{ github.event_name == 'workflow_dispatch' && inputs.workflow_name || '' }}
          MAX_RUNS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_runs || '500' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: scripts/github/delete-workflow-runs.sh
