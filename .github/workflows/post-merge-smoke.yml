name: Post-merge Smoke

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run post-merge smoke tests
        env:
          SMOKE_URLS: ${{ vars.POST_MERGE_SMOKE_URLS }}
          SMOKE_TIMEOUT_MS: ${{ vars.POST_MERGE_SMOKE_TIMEOUT_MS }}
          SMOKE_RETRIES: ${{ vars.POST_MERGE_SMOKE_RETRIES }}
        run: pnpm smoke:post-merge
