name: Validate Workspace Contracts

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

jobs:
  validate-workspace:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3df4d485d8ce6d2b61b8d12e8f44cdfffbea301e

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate worker structure
        run: pnpm validate:structure

      - name: Enforce workspace dependency protocol
        run: pnpm check:workspace-protocol

      - name: Validate worker names
        run: pnpm validate:workers

      - name: Validate workspace worker contract
        run: pnpm validate:workspace
