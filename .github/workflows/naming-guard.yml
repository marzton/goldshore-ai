name: Naming Guard

on:
  workflow_dispatch:

jobs:
  naming-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Block legacy app path references in active workflows
        run: |
          set -euo pipefail
          legacy_pattern='apps/(api-worker|control-worker|gateway)|Astro-'
          rg -n "$legacy_pattern" .github/workflows

      - name: Block legacy workflow filenames from active workflow directory
        run: |
          set -euo pipefail
          legacy_files=(
            ".github/workflows/deploy-web.yml"
            ".github/workflows/deploy-admin.yml"
            ".github/workflows/deploy-api-worker.yml"
            ".github/workflows/deploy-control-worker.yml"
            ".github/workflows/deploy-gateway.yml"
            ".github/workflows/deploy-agent.yml"
            ".github/workflows/preview-control-worker.yml"
          )

          for file in "${legacy_files[@]}"; do
            if [[ -e "$file" ]]; then
              echo "Legacy workflow file still exists: $file"
              exit 1
            fi
          done
