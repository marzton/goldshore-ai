name: Preview GS Admin (admin.goldshore.ai)
# apps/gs-admin is the internal, Access-protected Pages surface. Keep preview
# automation separate from gs-web so future cleanup preserves that boundary.

permissions:
  contents: read

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - ready_for_review
    paths:
      - "apps/gs-admin/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  preview-admin:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.labels.*.name, 'preview') ||
      (github.event.action == 'ready_for_review' && github.event.pull_request.base.ref == 'main')

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - id: metadata
        name: Resolve build metadata
        run: |
          set -euo pipefail

          {
            echo "deployed_sha=$(git rev-parse HEAD)"
            echo "build_timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "release_label=pr-${{ github.event.pull_request.number }}"
          } >> "$GITHUB_OUTPUT"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate workspace contract
        run: pnpm validate:workspace

      - name: Validate canonical worker structure
        run: pnpm validate:structure

      - name: Validate canonical worker names
        run: pnpm validate:names

      - name: Build GS admin cockpit (preview)
        working-directory: apps/gs-admin
        env:
          PUBLIC_API: https://api-preview.goldshore.ai
          PUBLIC_GATEWAY: https://gw-preview.goldshore.ai
          PUBLIC_BUILD_TIMESTAMP: ${{ steps.metadata.outputs.build_timestamp }}
          PUBLIC_COMMIT_HASH: ${{ steps.metadata.outputs.deployed_sha }}
          PUBLIC_RELEASE_LABEL: ${{ steps.metadata.outputs.release_label }}
        run: pnpm build

      - name: Deploy to Cloudflare Pages (preview)
        uses: cloudflare/pages-action@f0a1cd58cd66095dee69bfa18fa5efd1dde93bca # v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: preview-admin
          directory: apps/gs-admin/dist
          branch: ${{ github.head_ref || github.ref_name }}
