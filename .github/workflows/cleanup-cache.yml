# Manual operations guide:
# - Use this workflow to remove stale GitHub Actions caches when storage bloat or corrupted caches are suspected.
# - Pull-request-close runs handle routine cleanup automatically; manual runs are for operator intervention.
name: "Maintenance: Cleanup GitHub Actions Cache"
run-name: "Cache cleanup • ${{ github.event_name == 'workflow_dispatch' && format('@{0}', github.actor) || format('PR #{0}', github.event.pull_request.number) }}"

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Delete caches with goldshore-ai prefix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          CACHE_PREFIX: goldshore-ai
        shell: bash
        run: |
          set -euo pipefail

          keys="$(gh cache list --limit 1000 --json key --jq '.[].key' | sed '/^$/d' || true)"

          if [ -z "$keys" ]; then
            echo "No caches found."
            exit 0
          fi

          matched=0
          while IFS= read -r key; do
            if [[ "$key" == "$CACHE_PREFIX"* ]]; then
              matched=1
              echo "Deleting cache key: $key"
              gh cache delete "$key" || true
            fi
          done <<< "$keys"

          if [ "$matched" -eq 0 ]; then
            echo "No cache keys matched prefix: $CACHE_PREFIX"
          fi
