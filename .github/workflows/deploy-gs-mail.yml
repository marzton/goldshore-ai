name: Deploy Mail Worker (gs-mail)

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "apps/gs-mail/**"
      - ".github/workflows/deploy-gs-mail.yml"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run validator suite (stabilization-safe)
        # TODO(stabilization): remove wrapper bypass support after validator duplicate-symbol fixes are merged.
        run: pnpm validate:safe

      - name: Deploy
        working-directory: apps/gs-mail
        run: pnpm deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
