name: Deploy GS Mail Worker (gs-mail)

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "apps/gs-mail/**"
      - ".github/workflows/deploy-gs-mail.yml"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  deploy-mail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Validate workspace contract
        run: pnpm validate:workspace

      - name: Validate canonical worker structure
        run: pnpm validate:structure

      - name: Validate canonical worker names
        run: pnpm validate:names

      - name: Deploy
        working-directory: apps/gs-mail
        run: pnpm deploy --env prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
