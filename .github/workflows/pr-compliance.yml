name: PR Compliance

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-naming:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        if: github.event_name == 'pull_request'
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          echo "Checking branch name: $BRANCH_NAME"
          # Allow dependabot branches too
          if [[ "$BRANCH_NAME" == dependabot/* ]]; then
            echo "✅ Dependabot branch allowed."
            exit 0
          fi

          if [[ ! "$BRANCH_NAME" =~ ^(feature|release|hotfix|bugfix|chore|docs|test|refactor)\/ ]]; then
            echo "❌ Branch name '$BRANCH_NAME' does not follow the convention."
            echo "Allowed prefixes: feature/, release/, hotfix/, bugfix/, chore/, docs/, test/, refactor/"
            exit 1
          fi
          echo "✅ Branch name is valid."

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for duplicates
        run: pnpm dedupe:check

  code-quality:
    runs-on: ubuntu-latest
    needs: dependency-check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format Check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  wrangler-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Wrangler Configs
        run: pnpm validate:wrangler
