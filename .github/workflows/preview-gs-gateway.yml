name: Preview GS Gateway Worker (gw-preview.goldshore.ai)

permissions:
  contents: read

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - ready_for_review
    paths:
      - "apps/gs-gateway/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  preview-gateway:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.labels.*.name, 'preview') ||
      (github.event.action == 'ready_for_review' && github.event.pull_request.base.ref == 'main')

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate workspace contract
        run: pnpm validate:workspace

      - name: Validate canonical worker structure
        run: pnpm validate:structure

      - name: Validate canonical worker names
        run: pnpm validate:names

      - name: Deploy GS Gateway worker (preview)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILD_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: APP_NAME=gs-gateway pnpm --filter ./apps/$APP_NAME build && APP_NAME=gs-gateway pnpm wrangler deploy --env preview --outdir=apps/$APP_NAME/dist --keep-vars --config apps/$APP_NAME/wrangler.toml
