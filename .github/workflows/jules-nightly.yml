# Manual operations guide:
# - Use this workflow to manually trigger the same automation sweep normally started by the nightly schedule.
# - Prefer manual runs when operators need the downstream automation jobs immediately rather than waiting for the next cron window.
name: "Ops: Automation Sweep"
run-name: "Automation sweep • ${{ github.event_name == 'workflow_dispatch' && format('manual • @{0}', github.actor) || 'nightly schedule' }}"

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  jules-daily-guardian:
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: ./.github/workflows/jules-daily.yml

  jules-nightly-clean:
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/jules-nightly-clean.yml

  palette-daily:
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/palette-daily.yml

  sentinel-nightly:
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: ./.github/workflows/sentinel-nightly.yml

  conflict-sweeper-nightly:
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/conflict-sweeper-nightly.yml
  noop:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Sweepers removed
        run: echo "No sweeper jobs are configured in this workflow."
