name: PII Scan Pipeline

on:
  workflow_dispatch:

jobs:
  pii-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Run PII scan
        run: node scripts/pii-scan.mjs --mode ci --output apps/gs-admin/src/data/pii-scan-results.json --summary reports/pii-scan-summary.md

      - name: Publish summary
        run: cat reports/pii-scan-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: pii-scan-report
          path: reports/
