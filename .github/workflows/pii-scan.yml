# Manual operations guide:
# - Use this workflow to generate an updated PII scan artifact and Markdown summary for operator review.
# - Run it before audits or after data-model/content changes that could introduce new sensitive fields.
name: "Maintenance: PII Scan Report"
run-name: "PII scan • @${{ github.actor }}"

on:
  workflow_dispatch:

jobs:
  pii-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Run PII scan
        run: node scripts/pii-scan.mjs --mode ci --output apps/gs-admin/src/data/pii-scan-results.json --summary reports/pii-scan-summary.md

      - name: Publish summary
        run: cat reports/pii-scan-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        uses: actions/upload-artifact@v7
        with:
          name: pii-scan-report
          path: reports/
