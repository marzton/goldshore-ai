name: Jules Daily Guardian

on:
  workflow_call:

jobs:
  guardian:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Branch conflict audit
        run: bash scripts/branch-audit.sh

      - name: Missing asset checks
        run: node scripts/file-integrity-check.js

      - name: Repo health checks
        run: pnpm run repo:health
