name: Deploy GS Admin (admin.goldshore.ai)
# apps/gs-admin is the internal, Cloudflare Access-protected Pages surface.
# Keep this workflow separate from gs-web so future cleanup preserves that boundary.

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'apps/gs-admin/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-gs-web.yml'
      - '.github/workflows/deploy-gs-admin.yml'
      - '.github/workflows/deploy-gs-surfaces-report.yml'
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: Git ref to build and deploy for gs-admin.
        required: false
        type: string
      release_label:
        description: Optional release label to embed in build metadata.
        required: false
        type: string
  workflow_call:
    inputs:
      deploy_ref:
        description: Git ref to build and deploy for gs-admin.
        required: false
        type: string
      release_label:
        description: Optional release label to embed in build metadata.
        required: false
        type: string
    outputs:
      deployed_sha:
        description: Commit SHA that was built and deployed.
        value: ${{ jobs.deploy-admin.outputs.deployed_sha }}
      build_timestamp:
        description: UTC timestamp embedded in the deployed build.
        value: ${{ jobs.deploy-admin.outputs.build_timestamp }}
      release_label:
        description: Release label embedded in the deployed build metadata.
        value: ${{ jobs.deploy-admin.outputs.release_label }}

jobs:
  deploy-admin:
    runs-on: ubuntu-latest
    outputs:
      deployed_sha: ${{ steps.metadata.outputs.deployed_sha }}
      build_timestamp: ${{ steps.metadata.outputs.build_timestamp }}
      release_label: ${{ steps.metadata.outputs.release_label }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ inputs.deploy_ref != '' && inputs.deploy_ref || github.sha }}

      - id: metadata
        name: Resolve build metadata
        env:
          INPUT_RELEASE_LABEL: ${{ inputs.release_label }}
        run: |
          set -euo pipefail

          deployed_sha="$(git rev-parse HEAD)"
          build_timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          release_label="${INPUT_RELEASE_LABEL:-}"

          {
            echo "deployed_sha=${deployed_sha}"
            echo "build_timestamp=${build_timestamp}"
            echo "release_label=${release_label}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### gs-admin build metadata"
            echo "- Commit SHA: \\`${deployed_sha}\\`"
            echo "- Build timestamp: \\`${build_timestamp}\\`"
            if [[ -n "$release_label" ]]; then
              echo "- Release label: \\`${release_label}\\`"
            else
              echo "- Release label: _(not set)_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate workspace contract
        run: pnpm validate:workspace

      - name: Validate canonical worker structure
        run: pnpm validate:structure

      - name: Validate canonical worker names
        run: pnpm validate:names

      - name: Build admin app
        working-directory: apps/gs-admin
        env:
          PUBLIC_BUILD_TIMESTAMP: ${{ steps.metadata.outputs.build_timestamp }}
          PUBLIC_COMMIT_HASH: ${{ steps.metadata.outputs.deployed_sha }}
          PUBLIC_RELEASE_LABEL: ${{ steps.metadata.outputs.release_label }}
        run: pnpm build

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/pages-action@f0a1cd58cd66095dee69bfa18fa5efd1dde93bca
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: gs-admin
          directory: apps/gs-admin/dist
          branch: main
