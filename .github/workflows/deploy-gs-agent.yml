name: Deploy GS Agent Worker (gs-agent)

permissions:
  contents: read

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - ready_for_review
    paths:
      - "apps/gs-agent/**"
      - "infra/Cloudflare/gs-agent.wrangler.toml"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  preview-agent:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.labels.*.name, 'production') ||
      (github.event.action == 'ready_for_review' && github.event.pull_request.base.ref == 'main')

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate workspace contract
        run: pnpm validate:workspace

      - name: Validate canonical worker structure
        run: pnpm validate:structure

      - name: Validate canonical worker names
        run: pnpm validate:names

      - name: Deploy GS agent worker (preview)
        working-directory: apps/gs-agent
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILD_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy --env prod --config ../../infra/Cloudflare/gs-agent.wrangler.toml

