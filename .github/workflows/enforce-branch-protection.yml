name: Enforce Branch Protection

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/required-merge-checks.yml'
      - '.github/workflows/enforce-branch-protection.yml'
      - 'scripts/configure-branch-protection.mjs'

permissions:
  contents: read
  administration: write

jobs:
  protect-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3df4d485d8ce6d2b61b8d12e8f44cdfffbea301e
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply branch protection
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PROTECTED_BRANCH: main
        run: node scripts/configure-branch-protection.mjs
