name: Sentinel Nightly

on:
  workflow_call:

jobs:
  sentinel:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Sentinel nightly sweep
        run: ./.Jules/run-sentinel.jsagent --mode=sweep
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
