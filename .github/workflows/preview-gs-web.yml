name: Preview GS Web (goldshore.ai)

permissions:
  contents: read

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - ready_for_review
    paths:
      - "apps/gs-web/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  preview-web:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.labels.*.name, 'preview') ||
      (github.event.action == 'ready_for_review' && github.event.pull_request.base.ref == 'main')

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install pnpm
        run: npm install -g pnpm@9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate workspace contract
        run: pnpm validate:workspace

      - name: Validate canonical worker structure
        run: pnpm validate:structure

      - name: Validate canonical worker names
        run: pnpm validate:names

      - name: Build GS web app (preview)
        working-directory: apps/gs-web
        env:
          PUBLIC_API: https://api-preview.goldshore.ai
          PUBLIC_GATEWAY: https://gw-preview.goldshore.ai
          PUBLIC_BUILD_TIMESTAMP: ${{ github.run_started_at }}
          PUBLIC_COMMIT_HASH: ${{ github.sha }}
        run: pnpm build

      - name: Validate build artifacts
        working-directory: apps/gs-web
        run: |
          set -euo pipefail

          test -d dist/_astro
          find dist/_astro -maxdepth 1 -type f -name '*.css' -print -quit | grep -q .
          find dist/_astro -maxdepth 1 -type f -name '*.js' -print -quit | grep -q .
          grep -q '<link' dist/index.html
          grep -q '/_astro/' dist/index.html

      - name: Deploy to Cloudflare Pages (preview)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: preview-web
          directory: apps/gs-web/dist
          branch: ${{ github.head_ref || github.ref_name }}
