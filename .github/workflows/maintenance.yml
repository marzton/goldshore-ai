name: Maintenance Orchestration

on:
  workflow_dispatch:
    inputs:
      log_ref:
        description: 'Target ref for report'
        default: 'origin/main'
      log_limit:
        description: 'Number of logs'
        default: '20'
      confirm_apply:
        description: 'Set to true to run reconciliation'
        type: boolean
        default: false

concurrency:
  group: maintenance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Enable corepack
        run: corepack enable

      - name: Set pnpm version
        run: corepack prepare pnpm@9.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Repo health checks
        run: pnpm run repo:health

      - name: Build all packages
        run: pnpm -r build

      - name: Generate branch maintenance report
        env:
          GH_TOKEN: ${{ github.token }}
          LOG_REF: ${{ inputs.log_ref }}
          LOG_LIMIT: ${{ inputs.log_limit }}
        run: bash scripts/maintenance/branch-report.sh

      - name: Upload branch maintenance report
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-branch-report
          path: reports/maintenance/branch-report.txt

  reconcile-infra:
    needs: maintenance
    runs-on: ubuntu-latest
    if: ${{ inputs.confirm_apply == true }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
