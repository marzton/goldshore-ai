name: Deploy Admin (admin.goldshore.ai)

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "apps/admin/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  deploy-admin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3df4d485d8ce6d2b61b8d12e8f44cdfffbea301e

      - uses: pnpm/action-setup@f4a5c91e2a4b9c3d1e0f6b8c7a9d2e3f4b5c6d7e
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build admin app
        working-directory: apps/admin
        run: pnpm build

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/pages-action@c5e8d9f0a1b2c3d4e5f60718293a4b5c6d7e8f90
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: gs-admin
          directory: apps/admin/dist
          branch: main
