name: Deploy Admin (admin.goldshore.ai)

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "apps/admin/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  deploy-admin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3df4d485d8ce6d2b61b8d12e8f44cdfffbea301e

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.12.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build admin app
        working-directory: apps/admin
        run: pnpm build

      - name: Install Wrangler
        run: npm install -g wrangler@3.101.0

      - name: Deploy to Cloudflare Pages (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy apps/admin/dist --project-name gs-admin --branch main
