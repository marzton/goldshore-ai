name: Repository Audit

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "scripts/repo-audit.mjs"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/repo-audit.yml"

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run repository audit (PR regression gate)
        if: github.event_name == 'pull_request'
        run: node scripts/repo-audit.mjs --check-regression

      - name: Run repository audit (history snapshot)
        if: github.event_name != 'pull_request'
        run: node scripts/repo-audit.mjs --update-history

      - name: Publish summary
        run: cat reports/repo-audit-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repository-audit-report
          path: |
            reports/repo-audit.json
            reports/repo-audit-summary.md
            reports/repo-audit-history.json

  persist-history:
    if: github.event_name != 'pull_request'
    needs: audit
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerate audit history
        run: node scripts/repo-audit.mjs --update-history

      - name: Commit updated history
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(audit): update repository audit history"
          file_pattern: reports/repo-audit-history.json reports/repo-audit.json reports/repo-audit-summary.md
