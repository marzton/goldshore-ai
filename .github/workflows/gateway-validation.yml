name: Gateway Validation

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "apps/gs-gateway/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/gateway-validation.yml"
  push:
    branches:
      - main
    paths:
      - "apps/gs-gateway/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/gateway-validation.yml"

jobs:
  validate-gateway:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3df4d485d8ce6d2b61b8d12e8f44cdfffbea301e

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate root package.json
        run: jq . package.json >/dev/null

      - name: Validate gateway wrangler bindings
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib

          wrangler_path = Path("apps/gs-gateway/wrangler.toml")
          data = tomllib.loads(wrangler_path.read_text())

          discovered = set()

          def walk(node):
              if isinstance(node, dict):
                  for key, value in node.items():
                      if key == "binding" and isinstance(value, str):
                          discovered.add(value)
                      walk(value)
              elif isinstance(node, list):
                  for item in node:
                      walk(item)

          walk(data)

          required = {"GATEWAY_KV", "JOB_QUEUE", "API", "AI"}
          missing = sorted(required - discovered)

          if missing:
              raise SystemExit(f"Missing required wrangler bindings: {', '.join(missing)}")

          print("Discovered bindings:", ", ".join(sorted(discovered)))
          PY

      - name: Typecheck gateway package
        run: pnpm --filter @goldshore/gs-gateway exec tsc --noEmit
