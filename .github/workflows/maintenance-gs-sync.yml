# Manual operations guide:
# - Use this workflow to verify Cloudflare Access service-token authentication against deployed gs-* service endpoints.
# - Do not use it for Cloudflare KV or routing reconciliation; that operator task lives in maintenance-agent-sync.yml.
name: "Maintenance: GS Service Token Sync Check"
run-name: "Service token sync • ${{ inputs.services }}${{ inputs.endpoint_path != '/api/health' && format(' • {0}', inputs.endpoint_path) || '' }} • @${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      endpoint_path:
        description: "Service endpoint path to probe with Cloudflare Access service-token headers (for example: /api/health)."
        required: false
        default: "/health"
      base_domain:
        description: "Base domain appended to each gs-* service name when building the check URL."
        required: false
        default: "goldshore.ai"
      services:
        description: "Comma-separated gs-* services to check with service tokens. This only validates endpoint auth behavior; it does not reconcile infra state."
        required: false
        default: "gs-web,gs-admin,gs-api,gs-gateway,gs-mail,gs-agent,gs-control"
      timeout_seconds:
        description: "Maximum time in seconds to wait for each authenticated endpoint response."
        required: false
        default: "20"
      target_branch:
        description: "Branch the maintenance sync applies to"
        required: false
        default: "main"
      environment:
        description: "Target environment label for the sync"
        required: false
        default: "production"
  repository_dispatch:
    types:
      - maintenance_gs_sync

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GS_SYNC_PATH: ${{ github.event.client_payload.endpoint_path || inputs.endpoint_path || '/health' }}
      GS_BASE_DOMAIN: ${{ github.event.client_payload.base_domain || inputs.base_domain || 'goldshore.ai' }}
      GS_SERVICES: ${{ github.event.client_payload.services || inputs.services || 'gs-web,gs-admin,gs-api,gs-gateway,gs-mail,gs-agent,gs-control' }}
      GS_SYNC_TIMEOUT_SECONDS: ${{ github.event.client_payload.timeout_seconds || inputs.timeout_seconds || '20' }}
      GS_SYNC_TARGET_BRANCH: ${{ github.event.client_payload.target_branch || inputs.target_branch || github.ref_name }}
      GS_SYNC_ENVIRONMENT: ${{ github.event.client_payload.environment || inputs.environment || 'production' }}
      GS_SYNC_NOTIFICATION_BODY: ${{ github.event.client_payload.notification_body || '' }}
      GS_SYNC_SOURCE_WORKFLOW: ${{ github.event.client_payload.source_workflow || github.workflow }}
    steps:
      - uses: actions/checkout@v6

      - name: Publish maintenance sync context
        run: |
          set -euo pipefail

          {
            echo '## Maintenance GS service sync'
            echo "- Trigger source: \`${GS_SYNC_SOURCE_WORKFLOW}\`"
            echo "- Payload path: \`${GS_SYNC_PATH}\`"
            echo "- Target branch: \`${GS_SYNC_TARGET_BRANCH}\`"
            echo "- Environment: \`${GS_SYNC_ENVIRONMENT}\`"
            echo "- Base domain: \`${GS_BASE_DOMAIN}\`"
            echo "- Services: \`${GS_SERVICES}\`"
            if [[ -n "${GS_SYNC_NOTIFICATION_BODY}" ]]; then
              echo
              echo '### Notification body'
              printf '%s\n' "${GS_SYNC_NOTIFICATION_BODY}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Run jules service-token sync checks
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: scripts/jules-sync.sh
