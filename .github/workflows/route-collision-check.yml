name: Route Collision Check

permissions:
  contents: read

on:
  pull_request:
  workflow_dispatch:

jobs:
  route-collision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate route ownership matrix
        run: pnpm routes:generate
      - name: Verify route collisions
        run: pnpm routes:check-collisions
      - name: Ensure route map is committed
        run: git diff --exit-code docs/architecture/route-map.json docs/architecture/ownership-matrix.md
