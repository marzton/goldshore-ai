# Manual operations guide:
# - Use this workflow to regenerate the route ownership matrix and verify there are no collisions before or after routing changes.
# - Manual runs are useful when operators want the guard output without opening a pull request.
name: "Manual Guard: Route Collision Check"
run-name: "Route collision check • @${{ github.actor }}"

permissions:
  contents: read

on:
  pull_request:
  workflow_dispatch:

jobs:
  route-collision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate route ownership matrix
        run: pnpm routes:generate
      - name: Verify route collisions
        run: pnpm routes:check-collisions
      - name: Ensure route map is committed
        run: git diff --exit-code docs/architecture/route-map.json docs/architecture/ownership-matrix.md
