# .github/workflows/palette-manual.yml
name: Palette Manual Run

on:
  repository_dispatch:
    types: [PALETTE_RUN]

jobs:
  palette-manual:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run Palette Agent
        run: node .Jules/run-palette.js
