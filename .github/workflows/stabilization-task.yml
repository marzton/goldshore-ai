name: Stabilization Sync Check

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stabilization-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4.0.2
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: pnpm install

      - name: Run Stabilization Check
        run: node scripts/stabilization-check.mjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify report metadata freshness
        if: always()
        run: node scripts/verify-current-state-metadata.mjs

      - name: Commit Report
        if: always()
        uses: stefanzweifel/git-auto-commit-action@8756aa23fdb17af845c71d603e8b0a996b732448 # v5.0.0
        with:
          commit_message: "chore: update stabilization report"
          file_pattern: "docs/ci/CURRENT_STATE.md"
          skip_fetch: true
