name: Stabilization Sync Check

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stabilization-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install

      - name: Run Stabilization Check
        run: node scripts/stabilization-check.mjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit Report
        if: always()
        uses: stefanzweifel/git-auto-commit-action@8621497c8c39c72f3e2a999a26b4dad1f5186589 # v5.0.0
        with:
          commit_message: "chore: update stabilization report"
          file_pattern: "docs/ci/CURRENT_STATE.md"
          skip_fetch: true
