name: Repo Health

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  repo-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Branch conflict audit
        run: bash scripts/branch-audit.sh

      - name: Missing asset checks
        run: node scripts/file-integrity-check.js

      - name: Logo duplication check
        run: |
          if [ "$(rg --files -g '*logo*.svg' apps packages public | wc -l)" -gt 25 ]; then
            echo "Too many logo assets found"
            exit 1
          fi

      - name: Repo health checks
        run: pnpm run repo:health
