name: Repo Health

on:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/repo-health.yml"

concurrency:
  group: repo-health-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Branch conflict audit
        run: bash scripts/branch-audit.sh

      - name: Missing asset checks
        run: node scripts/file-integrity-check.js

      - name: Logo duplication check
        run: |
          if [ "$(rg --files -g '*logo*.svg' apps packages public | wc -l)" -gt 25 ]; then
            echo "Too many logo assets found"
            exit 1
          fi

      - name: Repo health checks
        run: pnpm run repo:health
