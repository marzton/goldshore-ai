name: Preview Control Worker (gs-control-worker)

permissions:
  contents: read

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - ready_for_review
    paths:
      - "apps/gs-control-worker/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  preview-control-worker:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.labels.*.name, 'preview') ||
      (github.event.action == 'ready_for_review' && github.event.pull_request.base.ref == 'main')

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy control worker (preview)
        working-directory: apps/gs-control-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy --env preview
