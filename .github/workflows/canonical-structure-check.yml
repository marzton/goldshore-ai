name: Canonical Structure Check

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  canonical-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate canonical structure memory lock
        run: node scripts/validate-canonical-structure.mjs
