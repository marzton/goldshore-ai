name: Local Reusable Workflow Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  local-reusable-workflow-paths:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate local reusable workflow targets exist
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          mapfile -t workflow_paths < <(
            rg -No --replace '$1' 'uses:\s*["'"'"']?(\./\.github/workflows/[^"'"'"'\s]+)' .github/workflows/*.yml \
              | sort -u
          )

          for workflow_path in "${workflow_paths[@]}"; do
            resolved_path="${workflow_path#./}"

            if [[ ! -f "$resolved_path" ]]; then
              echo "Missing local reusable workflow target: $workflow_path"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi
