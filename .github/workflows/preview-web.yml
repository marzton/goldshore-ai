name: Preview Web (goldshore.ai)

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
  push:
    branches:
      - "feature/**"

jobs:
  preview-web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3df4d485d8ce6d2b61b8d12e8f44cdfffbea301e

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.12.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app (preview)
        working-directory: apps/web
        env:
          PUBLIC_API: https://api-preview.goldshore.ai
          PUBLIC_GATEWAY: https://gw-preview.goldshore.ai
        run: pnpm build

      - name: Install Wrangler
        run: npm install -g wrangler@3.101.0

      - name: Deploy to Cloudflare Pages (preview)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy apps/web/dist --project-name preview-web --branch "${{ github.head_ref || github.ref_name }}"
