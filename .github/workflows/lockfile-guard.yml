name: Lockfile Guard

on:
  pull_request:

jobs:
  prevent-lockfile-drift:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prevent lockfile drift outside main
        run: |
          git fetch origin main

          if git diff --name-only origin/main...HEAD | grep -q "pnpm-lock.yaml"; then
            echo "❌ Lockfile changes are only allowed via main stabilization PR."
            exit 1
          else
            echo "✅ No lockfile drift detected."
          fi
