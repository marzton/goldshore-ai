# Manual operations guide:
# - Use this workflow to verify that a branch or ad-hoc change set does not modify pnpm-lock.yaml outside the approved process.
# - This is an operator guardrail, not a dependency-update workflow.
name: "Manual Guard: Lockfile Policy Check"
run-name: "Lockfile policy check • @${{ github.actor }}"

permissions:
  contents: read

on:
  pull_request:
  workflow_dispatch:

jobs:
  prevent-lockfile-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Guard pnpm lockfile
        run: |
          set -euo pipefail
          git fetch origin main

          if git diff --name-only origin/main...HEAD | grep -q '^pnpm-lock.yaml$'; then
            echo "❌ Detected changes to pnpm-lock.yaml in this pull request."
            echo "Lockfile updates must go through the designated lockfile update branch/process."
            exit 1
          fi

          echo "✅ No pnpm-lock.yaml changes detected."
