name: Deploy GS Web (goldshore.ai)

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "apps/gs-web/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  deploy-web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3df4d485d8ce6d2b61b8d12e8f44cdfffbea301e

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Validate root package.json
        run: jq . package.json >/dev/null

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate workspace contract
        run: pnpm validate:workspace

      - name: Validate canonical worker structure
        run: pnpm validate:structure

      - name: Validate canonical worker names
        run: pnpm validate:names

      - name: Build web app
        env:
          PUBLIC_BUILD_TIMESTAMP: ${{ github.run_started_at }}
          PUBLIC_COMMIT_HASH: ${{ github.sha }}
        run: pnpm --filter @goldshore/gs-web build

      - name: Validate build artifacts
        working-directory: apps/gs-web
        run: |
          set -euo pipefail

          test -d dist/_astro
          find dist/_astro -maxdepth 1 -type f -name '*.css' -print -quit | grep -q .
          find dist/_astro -maxdepth 1 -type f -name '*.js' -print -quit | grep -q .
          grep -q '<link' dist/index.html
          grep -q '/_astro/' dist/index.html

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: gs-web
          directory: apps/gs-web/dist
          branch: main
