name: Deploy GS Web (goldshore.ai)

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "apps/gs-web/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    name: Deploy Web

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check package.json script key duplicates
        run: pnpm run check:package-json-duplicates

      - name: Validate workspace contract
        run: pnpm validate:workspace

      - name: Validate canonical worker structure
        run: pnpm validate:structure

      - name: Validate canonical worker names
        run: pnpm validate:names

      - name: Build web app (production)
        working-directory: apps/gs-web
        env:
          PUBLIC_API: https://api.goldshore.ai
          PUBLIC_GATEWAY: https://gw.goldshore.ai
          PUBLIC_ENV: production
          PUBLIC_BUILD_TIMESTAMP: ${{ github.run_started_at }}
          PUBLIC_COMMIT_HASH: ${{ github.sha }}
        run: pnpm build

      - name: Validate build artifacts
        working-directory: apps/gs-web
        run: |
          set -euo pipefail

          test -d dist/_astro
          find dist/_astro -maxdepth 1 -type f -name '*.css' -print -quit | grep -q .
          find dist/_astro -maxdepth 1 -type f -name '*.js' -print -quit | grep -q .
          grep -q '<link' dist/index.html
          grep -q '/_astro/' dist/index.html

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_BUILD_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: gs-web
          directory: apps/gs-web/dist
          branch: main
