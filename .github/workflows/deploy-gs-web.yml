name: Deploy GS Web (goldshore.ai)
# apps/gs-web is the public Cloudflare Pages surface. Keep this workflow separate
# from gs-admin so future cleanup does not collapse the public/private boundary.

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "apps/gs-web/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-gs-web.yml"
      - ".github/workflows/deploy-gs-admin.yml"
      - ".github/workflows/deploy-gs-surfaces-report.yml"
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: Git ref to build and deploy for gs-web.
        required: false
        type: string
      release_label:
        description: Optional release label to embed in build metadata.
        required: false
        type: string
  workflow_call:
    inputs:
      deploy_ref:
        description: Git ref to build and deploy for gs-web.
        required: false
        type: string
      release_label:
        description: Optional release label to embed in build metadata.
        required: false
        type: string
    outputs:
      deployed_sha:
        description: Commit SHA that was built and deployed.
        value: ${{ jobs.deploy-web.outputs.deployed_sha }}
      build_timestamp:
        description: UTC timestamp embedded in the deployed build.
        value: ${{ jobs.deploy-web.outputs.build_timestamp }}
      release_label:
        description: Release label embedded in the deployed build metadata.
        value: ${{ jobs.deploy-web.outputs.release_label }}

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    outputs:
      deployed_sha: ${{ steps.metadata.outputs.deployed_sha }}
      build_timestamp: ${{ steps.metadata.outputs.build_timestamp }}
      release_label: ${{ steps.metadata.outputs.release_label }}

    steps:
      - uses: actions/checkout@3df4d485d8ce6d2b61b8d12e8f44cdfffbea301e
        with:
          ref: ${{ inputs.deploy_ref != '' && inputs.deploy_ref || github.sha }}

      - id: metadata
        name: Resolve build metadata
        env:
          INPUT_RELEASE_LABEL: ${{ inputs.release_label }}
        run: |
          set -euo pipefail

          deployed_sha="$(git rev-parse HEAD)"
          build_timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          release_label="${INPUT_RELEASE_LABEL:-}"

          {
            echo "deployed_sha=${deployed_sha}"
            echo "build_timestamp=${build_timestamp}"
            echo "release_label=${release_label}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### gs-web build metadata"
            echo "- Commit SHA: \\`${deployed_sha}\\`"
            echo "- Build timestamp: \\`${build_timestamp}\\`"
            if [[ -n "$release_label" ]]; then
              echo "- Release label: \\`${release_label}\\`"
            else
              echo "- Release label: _(not set)_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Codebase Verification (Validate, Lint, Test)
        run: |
          pnpm validate
          pnpm lint
          pnpm test

      - name: Build web app
        working-directory: apps/gs-web
        env:
          PUBLIC_BUILD_TIMESTAMP: ${{ steps.metadata.outputs.build_timestamp }}
          PUBLIC_COMMIT_HASH: ${{ steps.metadata.outputs.deployed_sha }}
          PUBLIC_RELEASE_LABEL: ${{ steps.metadata.outputs.release_label }}
        run: pnpm build

      - name: Validate build artifacts
        working-directory: apps/gs-web
        run: |
          set -euo pipefail

          test -d dist/_astro
          find dist/_astro -maxdepth 1 -type f -name '*.css' -print -quit | grep -q .
          find dist/_astro -maxdepth 1 -type f -name '*.js' -print -quit | grep -q .
          grep -q '<link' dist/index.html
          grep -q '/_astro/' dist/index.html

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: gs-web
          directory: apps/gs-web/dist
          branch: main
