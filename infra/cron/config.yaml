# Polling scope & behavior
poll_interval_minutes: 15
auto_open_fix_pr: true
auto_comment_on_incidents: true
max_parallel_checks: 6

github:
  org: goldshore
  repos:
    - goldshore
    - gs-admin
    - gs-api
  branch_protection:
    required_approving_review_count: 1
    dismiss_stale_reviews: true
    require_status_checks: true
    enforce_admins: true

cloudflare:
  account_id_env: CF_ACCOUNT_ID
  zone_id_env: CF_ZONE_ID
  checks:
    - type: "pages_build_status"
      project: "gs-web"
    - type: "pages_build_status"
      project: "gs-admin"
    - type: "worker_health"
      script: "gs-api"
      path: "/health"
    - type: "dns_records"
      required:
        - name: "goldshore.ai"
          type: "CNAME"
        - name: "api.goldshore.ai"
          type: "CNAME"
        - name: "admin.goldshore.ai"
          type: "CNAME"
        - name: "gateway.goldshore.ai"
          type: "CNAME"
        - name: "status.goldshore.ai"
          type: "CNAME"
        - name: "_dmarc.goldshore.ai"
          type: "TXT"
          contains: "v=DMARC1; p=reject; rua=mailto:security@goldshore.ai"
        - name: "goldshore.ai"
          type: "TXT"
          contains: "v=spf1"

ai_agent:
  notify_webhook_env: AGENT_WEBHOOK_URL
  label_prefix: "agent:"
  triage_labels:
    - "agent:triage"
    - "ops"
    - "infra"

rules:
  open_conflicts:
    auto_fix_strategy: "rebase-onto-main"
    open_pr_comment: true
  pages_output_dirs:
    - repo: "gs-admin"
      path: "apps/gs-admin/dist"
  sensitive:
    disallow_plaintext_secrets: true
    required_secrets:
      - GH_TOKEN
      - CF_API_TOKEN
      - CF_ACCOUNT_ID
      - CF_ZONE_ID
