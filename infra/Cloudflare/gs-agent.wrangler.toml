# wrangler.toml for the background Agent Worker

name = "gs-agent"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# This worker is queue-driven, so we define the consumer here at top level.
[[queues.consumers]]
queue = "goldshore-jobs"
max_batch_size = 10
max_batch_timeout = 5

[env.dev]
name = "gs-agent-dev"

[env.preview]
name = "gs-agent-preview"

[env.prod]
name = "gs-agent"
main = "../../apps/gs-agent/src/index.ts"
tsconfig = "../../apps/gs-agent/tsconfig.json"
[env.prod.vars]
ENV = "production"
CLOUDFLARE_TEAM_DOMAIN = "gsl-ops"
[env.prod.ai]
binding = "AI"
[[env.prod.queues.consumers]]
queue = "goldshore-jobs"
max_batch_size = 10
max_batch_timeout = 5
[[env.prod.kv_namespaces]]
binding = "AGENT_KV"
id = "9cc2209906a94851b704be57543987a9"

[env.production]
name = "gs-agent"
main = "../../apps/gs-agent/src/index.ts"
tsconfig = "../../apps/gs-agent/tsconfig.json"
[env.production.vars]
ENV = "production"
CLOUDFLARE_TEAM_DOMAIN = "gsl-ops"
[env.production.ai]
binding = "AI"
[[env.production.queues.consumers]]
queue = "goldshore-jobs"
max_batch_size = 10
max_batch_timeout = 5
[[env.production.kv_namespaces]]
binding = "AGENT_KV"
id = "9cc2209906a94851b704be57543987a9"
