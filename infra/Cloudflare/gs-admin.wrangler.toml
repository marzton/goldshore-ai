# Worker Builds token for this service must be the gs-control build token.
# wrangler.toml for the gs-admin Astro Pages app (for Pages Functions; formerly goldshore-admin)

name = "gs-admin" # Base name for Pages project

# This file is primarily for configuring bindings for Cloudflare Pages Functions.
# The actual deployment will be handled by the GitHub Action connecting to the Pages project.

[vars]
# Shared environment variables can go here.

[env.dev]
# Dev bindings for Pages Functions
# [[d1_databases]]
# binding = "D1_DATABASE"
# database_name = "goldshore_cms_dev"
# database_id = "..."
#
# [[r2_buckets]]
# binding = "R2_BUCKET"
# bucket_name = "assets-dev"
#
# [[queues.producers]]
# binding = "QUEUES_JOBS"
# queue = "goldshore-jobs-dev"


[env.preview]
# Preview bindings for Pages Functions

[env.prod]
# Production bindings for Pages Functions


# Route boundary: admin worker must own only admin hostnames
routes = [
  { pattern = "admin.goldshore.ai/*", zone_name = "goldshore.ai" }
]
