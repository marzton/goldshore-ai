# wrangler.toml for the API Worker (canonical gs-api service; legacy alias goldshore-api)

name = "gs-api" # Canonical Worker base name; will be suffixed per environment
main = "../../apps/api-worker/src/index.ts"
compatibility_date = "2024-03-20"
tsconfig = "../../apps/api-worker/tsconfig.json"

[env.dev]
name = "gs-api-dev"
# Here we will add bindings for dev environment for KV, D1, R2, Queues etc.
# Example:
# [[d1_databases]]
# binding = "D1_DATABASE"
# database_name = "goldshore_cms_dev"
# database_id = "..."

[env.preview]
name = "gs-api-preview"
# route = { pattern = "api-preview.goldshore.ai/*", custom_domain = true }
# Bindings for the preview environment go here.

[env.prod]
name = "gs-api-prod"
# route = { pattern = "api.goldshore.ai/*", custom_domain = true }
# Bindings for the production environment go here.
