# wrangler.toml for the goldshore-web Astro Pages app (for Pages Functions)

name = "gs-web" # Base name for Pages project
compatibility_date = "2024-11-01"

# This file is primarily for configuring bindings for Cloudflare Pages Functions.
# The actual deployment will be handled by the GitHub Action connecting to the Pages project.

[vars]

[env.dev]

[[env.dev.kv_namespaces]]
binding = "KV"
id = "a5f6e9c0d1b2473ea4f8c9b0d2e1f3a4"
preview_id = "a5f6e9c0d1b2473ea4f8c9b0d2e1f3a4"

[[env.dev.kv_namespaces]]
binding = "HERO_CONFIG_KV"
id = "9cc2209906a94851b704be57543987a9"
preview_id = "9cc2209906a94851b704be57543987a9"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "goldshore_cms_dev"
database_id = "2a9d3f8e-1f24-4c7a-9c31-7eb31d4a1f6a"

[env.preview]

[[env.preview.kv_namespaces]]
binding = "KV"
id = "c7d9a0e1f2b3456ca8d9e0f1a2b3c4d5"
