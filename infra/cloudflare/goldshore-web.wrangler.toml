# Wrangler config for the Goldshore Web Pages Functions runtime.

name = "goldshore-web"

[vars]
SERVICE_DOMAIN = "web"

[env.dev]
name = "goldshore-web-dev"
[env.dev.vars]
APP_ENV = "dev"

[env.preview]
name = "goldshore-web-preview"
[env.preview.vars]
APP_ENV = "preview"

[env.staging]
name = "goldshore-web-staging"
[env.staging.vars]
APP_ENV = "staging"

[env.prod]
name = "goldshore-web-prod"
[env.prod.vars]
APP_ENV = "prod"
